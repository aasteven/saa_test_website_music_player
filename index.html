let audioCtx = null;
let scheduledNodes = [];
let isPlaying = false;
let currentTrackIndex = 0;
let pausedOffset = 0;
let loopAnchorCtxTime = 0; // ctx.currentTime corresponding to loop position 0 of the current play run
let schedulerIntervalId = null; // recurring timer that keeps scheduling future loop iterations
let nextIterationStartCtxTime = 0; // ctx.currentTime at which the next not-yet-scheduled iteration begins

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function stopPlayback() {
  if (schedulerIntervalId) {
    clearInterval(schedulerIntervalId);
    schedulerIntervalId = null;
  }
  scheduledNodes.forEach(osc => {
    try { osc.stop(); } catch (e) { /* already stopped */ }
  });
  scheduledNodes = [];
}

function scheduleLoopIteration(track, ctx, iterationStartCtxTime) {
  track.notes.forEach(note => {
    const when = iterationStartCtxTime + note.time;
    if (when < ctx.currentTime) return;
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.type = track.waveform;
    osc.frequency.value = note.freq;
    gainNode.gain.setValueAtTime(0, when);
    gainNode.gain.linearRampToValueAtTime(note.gain, when + 0.02);
    gainNode.gain.linearRampToValueAtTime(0.0001, when + note.dur);
    osc.connect(gainNode).connect(ctx.destination);
    osc.start(when);
    osc.stop(when + note.dur + 0.05);
    scheduledNodes.push(osc);
  });
}

function scheduleUpcomingIterations(track, ctx) {
  // Keep scheduling loop iterations far enough ahead of playback that
  // audio never runs out of scheduled notes, without scheduling the
  // entire (potentially infinite) future up front.
  const lookaheadSeconds = 2;
  while (nextIterationStartCtxTime < ctx.currentTime + track.duration + lookaheadSeconds) {
    scheduleLoopIteration(track, ctx, nextIterationStartCtxTime);
    nextIterationStartCtxTime += track.duration;
  }
}

function playTrack(track, offsetSeconds) {
  const ctx = getAudioCtx();
  stopPlayback();
  loopAnchorCtxTime = ctx.currentTime - offsetSeconds;
  nextIterationStartCtxTime = loopAnchorCtxTime;
  scheduleUpcomingIterations(track, ctx);
  // Re-run scheduling periodically so the loop keeps going until stopPlayback() is called.
  schedulerIntervalId = setInterval(() => scheduleUpcomingIterations(track, ctx), 1000);
}

function getPlayheadSeconds(track) {
  const ctx = getAudioCtx();
  const elapsed = ctx.currentTime - loopAnchorCtxTime;
  return ((elapsed % track.duration) + track.duration) % track.duration;
}
